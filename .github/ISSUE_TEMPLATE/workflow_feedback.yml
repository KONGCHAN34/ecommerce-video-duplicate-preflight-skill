name: Workflow feedback
description: Share public-safe feedback from using the preflight workflow.
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the workflow without sharing private media or account data.
    validations:
      required: true
  - type: textarea
    id: useful
    attributes:
      label: What was useful?
  - type: textarea
    id: confusing
    attributes:
      label: What was confusing?
  - type: textarea
    id: next
    attributes:
      label: What should improve next?

