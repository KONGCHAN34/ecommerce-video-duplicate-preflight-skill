name: Feature request
description: Suggest a detection, reporting, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Any risk around private media, destructive actions, or platform claims?

