name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository
        run: python3 scripts/validate_repository.py
      - name: Check scanner help
        run: python3 .agents/skills/ecommerce-video-preflight/scripts/scan_video_duplicates.py --help

